<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Consumo - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="contenedor-login">
        <h1>⚡ Tu Consumo</h1>
        <h2>Iniciar Sesión</h2>

        <input type="text" id="nombre_usuario" placeholder="Nombre de usuario" autocomplete="username">
        <input type="password" id="contrasena_usuario" placeholder="Contraseña" autocomplete="current-password">

        <button onclick="loginUsuario()">Iniciar Sesión</button>
        <p id="mensaje"></p>

        <a href="registro.html">¿No tienes cuenta? Regístrate</a>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
